<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stefan Pennings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #F7F4F0;
    font-family: 'Jost', sans-serif;
  }
  .gate {
    text-align: center;
    padding: 3rem 2rem;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 400;
    color: #2A2420;
    margin-bottom: 0.5rem;
  }
  p {
    color: #8A8278;
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }
  input[type="password"] {
    display: block;
    width: 260px;
    padding: 0.8rem 1.2rem;
    border: 1px solid #D9D0C0;
    background: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 1rem;
    color: #2A2420;
    outline: none;
    margin: 0 auto 0.75rem;
  }
  input[type="password"]:focus {
    border-color: #A8906A;
  }
  button {
    display: block;
    width: 260px;
    padding: 0.8rem 1.2rem;
    background: #A8906A;
    color: #fff;
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    margin: 0 auto;
  }
  button:hover { background: #C4A882; }
  .error {
    color: #c0392b;
    font-size: 0.85rem;
    margin-top: 0.75rem;
    min-height: 1.2rem;
  }
</style>
</head>
<body>
<div class="gate">
  <h1>Stefan Pennings</h1>
  <p>Voer het wachtwoord in om verder te gaan.</p>
  <input type="password" id="pw" placeholder="Wachtwoord" autofocus />
  <button onclick="check()">Ga verder</button>
  <div class="error" id="err"></div>
</div>
<script>
  document.getElementById('pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') check();
  });
  function check() {
    if (document.getElementById('pw').value === 'Sienna10!') {
      sessionStorage.setItem('auth', '1');
      window.location.href = 'index.html';
    } else {
      document.getElementById('err').textContent = 'Onjuist wachtwoord. Probeer opnieuw.';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }
</script>
</body>
</html>
